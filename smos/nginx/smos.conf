server {
    listen 80;
    server_name smos-cloud.com www.smos-cloud.com localhost;

    # Certbot ACME Challenge path mapping
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name smos-cloud.com www.smos-cloud.com localhost;

    # SSL Certificate Paths (mounted from Let's Encrypt host volume)
    ssl_certificate /etc/letsencrypt/live/smos-cloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smos-cloud.com/privkey.pem;

    # SSL Optimization settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Backend API Routing
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Cloudflare Tunnel Real IP mapping
        # Cloudflare forwards the original visitor IP in CF-Connecting-IP
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Static Files
    location / {
        root /var/www/frontend;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # React Router support
    }
}
