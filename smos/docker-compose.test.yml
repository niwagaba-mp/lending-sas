version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smos_db_test
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smos_db
    volumes:
      - smos_pgdata_test:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - smos_network

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: smos_backend_test
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgres://postgres:password@db:5432/smos_db
      - JWT_SECRET=smos_jwt_secret_test_key_12345
      - SMS_API_KEY=test_sms_key
      - MOMO_API_KEY=test_momo_key
      - ALLOWED_ORIGINS=*
    ports:
      - "127.0.0.1:5000:5000" # Internal only
    depends_on:
      - db
    networks:
      - smos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    container_name: smos_frontend_test_build
    volumes:
      - smos_frontend_assets_test:/app/build

  nginx:
    image: nginx:alpine
    container_name: smos_nginx_test
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/smos-local.conf:/etc/nginx/conf.d/default.conf
      - smos_frontend_assets_test:/var/www/frontend
    depends_on:
      - backend
      - frontend
    networks:
      - smos_network

volumes:
  smos_pgdata_test:
  smos_frontend_assets_test:

networks:
  smos_network:
    driver: bridge
