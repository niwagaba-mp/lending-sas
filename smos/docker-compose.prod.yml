version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smos_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - smos_pgdata_prod:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - smos_network

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: smos_backend_prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - SMS_API_KEY=${SMS_API_KEY}
      - MOMO_API_KEY=${MOMO_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    ports:
      - "127.0.0.1:5000:5000" # Only accessible internally by Nginx
    depends_on:
      - db
    networks:
      - smos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod # Assume multi-stage build that outputs static files
    container_name: smos_frontend_build
    volumes:
      - smos_frontend_assets:/app/build

  nginx:
    image: nginx:alpine
    container_name: smos_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/smos.conf:/etc/nginx/conf.d/default.conf
      - smos_frontend_assets:/var/www/frontend
      - /etc/letsencrypt:/etc/letsencrypt # Mount SSL certs
      - ./certbot/www:/var/www/certbot # Mount Certbot webroot for validation
    depends_on:
      - backend
      - frontend
    networks:
      - smos_network

volumes:
  smos_pgdata_prod:
  smos_frontend_assets:

networks:
  smos_network:
    driver: bridge
